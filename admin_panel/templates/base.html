<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Center Club Admin{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #1a1a24;
  --border: #2a2a38;
  --accent: #7c6af7;
  --accent2: #4ecdc4;
  --danger: #ff4757;
  --warn: #ffa502;
  --success: #2ed573;
  --text: #e8e8f0;
  --text2: #8888a8;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; display: flex; }

/* Sidebar */
.sidebar {
  width: 220px; min-height: 100vh; background: var(--surface);
  border-right: 1px solid var(--border); padding: 24px 0;
  display: flex; flex-direction: column; position: fixed; top: 0; left: 0;
}
.sidebar-logo {
  padding: 0 20px 24px; border-bottom: 1px solid var(--border);
  font-family: var(--mono); font-size: 13px; color: var(--accent);
  letter-spacing: 2px; text-transform: uppercase;
}
.sidebar-logo span { display: block; font-size: 18px; font-weight: 600; margin-bottom: 2px; }
.nav { padding: 16px 0; flex: 1; }
.nav a {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 20px; color: var(--text2); text-decoration: none;
  font-size: 14px; font-weight: 500; transition: all 0.15s;
  border-left: 3px solid transparent;
}
.nav a:hover { color: var(--text); background: var(--surface2); }
.nav a.active { color: var(--accent); border-left-color: var(--accent); background: rgba(124,106,247,0.08); }
.nav-icon { font-size: 16px; width: 20px; text-align: center; }
.sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); }
.sidebar-footer a { color: var(--text2); text-decoration: none; font-size: 13px; }
.sidebar-footer a:hover { color: var(--danger); }

/* Main */
.main { margin-left: 220px; flex: 1; min-height: 100vh; }
.topbar {
  padding: 20px 32px; border-bottom: 1px solid var(--border);
  background: var(--surface); display: flex; align-items: center;
  justify-content: space-between;
}
.topbar h1 { font-size: 18px; font-weight: 600; }
.topbar-meta { font-family: var(--mono); font-size: 11px; color: var(--text2); }
.content { padding: 32px; }

/* Cards */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 24px;
}
.card-sm { padding: 16px 20px; }

/* Stats grid */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 20px; position: relative; overflow: hidden;
}
.stat-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--accent);
}
.stat-label { font-family: var(--mono); font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.stat-value { font-size: 32px; font-weight: 600; font-family: var(--mono); color: var(--text); }
.stat-card.green::before { background: var(--success); }
.stat-card.cyan::before { background: var(--accent2); }
.stat-card.warn::before { background: var(--warn); }

/* Tables */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { padding: 10px 14px; text-align: left; font-family: var(--mono); font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border); }
td { padding: 12px 14px; border-bottom: 1px solid rgba(42,42,56,0.5); vertical-align: middle; }
tr:hover td { background: var(--surface2); }
.mono { font-family: var(--mono); font-size: 12px; }

/* Badges */
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-family: var(--mono); font-weight: 500; }
.badge-en { background: rgba(78,205,196,0.15); color: var(--accent2); }
.badge-ru { background: rgba(124,106,247,0.15); color: var(--accent); }
.badge-hy { background: rgba(255,71,87,0.15); color: var(--danger); }

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; text-decoration: none; transition: all 0.15s; font-family: var(--sans); }
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: #6b5ae0; }
.btn-danger { background: rgba(255,71,87,0.15); color: var(--danger); border: 1px solid rgba(255,71,87,0.3); }
.btn-danger:hover { background: rgba(255,71,87,0.25); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
.btn-ghost:hover { color: var(--text); border-color: var(--text2); }

/* Forms */
input, select, textarea {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  border-radius: 6px; padding: 8px 12px; font-size: 13px; font-family: var(--sans);
  outline: none; width: 100%;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
label { font-size: 12px; font-family: var(--mono); color: var(--text2); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 6px; }
.form-group { margin-bottom: 16px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* Section header */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.section-title { font-size: 15px; font-weight: 600; }

/* Alert */
.alert { padding: 12px 16px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; }
.alert-danger { background: rgba(255,71,87,0.1); border: 1px solid rgba(255,71,87,0.3); color: var(--danger); }
.alert-success { background: rgba(46,213,115,0.1); border: 1px solid rgba(46,213,115,0.3); color: var(--success); }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: none; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 28px; width: 480px; max-width: 95vw; }
.modal-title { font-size: 15px; font-weight: 600; margin-bottom: 20px; }
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
</style>
{% block extra_style %}{% endblock %}
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <span>⚡ CC</span>
    Admin Panel
  </div>
  <nav class="nav">
    <a href="/" class="{% if active=='dashboard' %}active{% endif %}">
      <span class="nav-icon">▪</span> Dashboard
    </a>
    <a href="/users" class="{% if active=='users' %}active{% endif %}">
      <span class="nav-icon">◈</span> Users
    </a>
    <a href="/bookings" class="{% if active=='bookings' %}active{% endif %}">
      <span class="nav-icon">◆</span> Bookings
    </a>
    <a href="/events" class="{% if active=='events' %}active{% endif %}">
      <span class="nav-icon">✦</span> Events
    </a>
    <a href="/notifications" class="{% if active=='notifications' %}active{% endif %}">
      <span class="nav-icon">◉</span> Notify
    </a>
  </nav>
  <div class="sidebar-footer">
    <a href="/logout">⇥ Logout</a>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <h1>{% block page_title %}Dashboard{% endblock %}</h1>
    <div class="topbar-meta">CENTER CLUB BOT · ADMIN</div>
  </div>
  <div class="content">
    {% block content %}{% endblock %}
  </div>
</div>

{% block scripts %}{% endblock %}
</body>
</html>
